{{ define "base" -}}
<!doctype html>
<html lang="{{ .Site.Language }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }}</title>
    {{- if .Description }}
    <meta name="description" content="{{ .Description }}">
    {{- end }}
    <link rel="canonical" href="{{ .CanonicalURL }}">
    {{- if .StylesheetURL }}
    <link rel="stylesheet" href="{{ .StylesheetURL }}">
    {{- end }}
    {{- range .ExtraStylesheets }}
    <link rel="stylesheet" href="{{ . }}">
    {{- end }}
    <link rel="alternate" type="application/rss+xml" href="/feed.xml" title="{{ .Site.Title }}">
  </head>
  <body>
    <header class="site-header">
      <div class="shell shell-wide">
        <a class="brand" href="/">{{ .Site.Title }}</a>
        <nav class="site-nav" aria-label="Primary">
          {{- range .Site.Navigation }}
          <a href="{{ .URL }}">{{ .Label }}</a>
          {{- end }}
        </nav>
      </div>
    </header>
    <main class="shell">
      {{ template "body" . }}
    </main>
    {{- if .ClientRender }}
    <script
      defer
      src="{{ .ClientRender.BootstrapURL }}"
      data-sbl-render="1"
      data-katex-css-url="{{ .ClientRender.KaTeXCSSURL }}"
      data-katex-js-url="{{ .ClientRender.KaTeXJSURL }}"
      data-mermaid-js-url="{{ .ClientRender.MermaidJSURL }}"
      data-prism-core-js-url="{{ .ClientRender.PrismCoreJSURL }}"
      data-prism-autoloader-js-url="{{ .ClientRender.PrismAutoloaderJSURL }}"
      data-prism-languages-path="{{ .ClientRender.PrismLanguagesPath }}"></script>
    {{- end }}
  </body>
</html>
{{- end }}
