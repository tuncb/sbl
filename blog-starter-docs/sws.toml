[general]
host = "0.0.0.0"
port = 8080
root = "./public"
log-level = "warn"
grace-period = 5

# We set cache headers explicitly below.
cache-control-headers = false

compression = true
compression-level = "default"
compression-static = false

# Use real error pages from the output root.
page404 = "./404.html"
page50x = "./50x.html"

# This is a content site, not an SPA.
# Leave fallback mode off so missing pages stay 404.
# page-fallback = ""

security-headers = true

directory-listing = false
redirect-trailing-slash = true
ignore-hidden-files = true
disable-symlinks = true
health = true
accept-markdown = false
index-files = "index.html"

# Uncomment and configure only if SWS is terminating TLS itself.
# http2 = true
# http2-tls-cert = "/etc/ssl/certs/fullchain.pem"
# http2-tls-key = "/etc/ssl/private/privkey.pem"
# https-redirect = true
# https-redirect-host = "example.com"
# https-redirect-from-port = 80
# https-redirect-from-hosts = "example.com,www.example.com"

[advanced]

# -----------------------------------------------------------------------------
# Cache policy for HTML pages
# -----------------------------------------------------------------------------

[[advanced.headers]]
source = "/"
[advanced.headers.headers]
Cache-Control = "public, max-age=0, must-revalidate"
Content-Security-Policy = "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), geolocation=(), microphone=()"

[[advanced.headers]]
source = "/archive/"
[advanced.headers.headers]
Cache-Control = "public, max-age=0, must-revalidate"
Content-Security-Policy = "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), geolocation=(), microphone=()"

[[advanced.headers]]
source = "/posts/**/"
[advanced.headers.headers]
Cache-Control = "public, max-age=0, must-revalidate"
Content-Security-Policy = "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), geolocation=(), microphone=()"

[[advanced.headers]]
source = "/pages/**/"
[advanced.headers.headers]
Cache-Control = "public, max-age=0, must-revalidate"
Content-Security-Policy = "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), geolocation=(), microphone=()"

[[advanced.headers]]
source = "/404.html"
[advanced.headers.headers]
Cache-Control = "public, max-age=0, must-revalidate"
X-Robots-Tag = "noindex, nofollow"
Content-Security-Policy = "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), geolocation=(), microphone=()"

[[advanced.headers]]
source = "/50x.html"
[advanced.headers.headers]
Cache-Control = "public, max-age=0, must-revalidate"
X-Robots-Tag = "noindex, nofollow"
Content-Security-Policy = "default-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), geolocation=(), microphone=()"

# -----------------------------------------------------------------------------
# Cache policy for fingerprinted assets
# -----------------------------------------------------------------------------

[[advanced.headers]]
source = "/assets/**"
headers = { Cache-Control = "public, max-age=31536000, immutable" }

# -----------------------------------------------------------------------------
# Short-lived top-level files that may change after deploys
# -----------------------------------------------------------------------------

[[advanced.headers]]
source = "/feed.xml"
headers = { Cache-Control = "public, max-age=3600, must-revalidate" }

[[advanced.headers]]
source = "/sitemap.xml"
headers = { Cache-Control = "public, max-age=3600, must-revalidate" }

[[advanced.headers]]
source = "/robots.txt"
headers = { Cache-Control = "public, max-age=3600, must-revalidate" }

[[advanced.headers]]
source = "/favicon.ico"
headers = { Cache-Control = "public, max-age=86400, must-revalidate" }

[[advanced.headers]]
source = "/favicon.svg"
headers = { Cache-Control = "public, max-age=86400, must-revalidate" }

[[advanced.headers]]
source = "/site.webmanifest"
headers = { Cache-Control = "public, max-age=86400, must-revalidate" }

# -----------------------------------------------------------------------------
# Canonicalization redirects
# -----------------------------------------------------------------------------

[[advanced.redirects]]
source = "/index.html"
destination = "/"
kind = 301

[[advanced.redirects]]
source = "/archive/index.html"
destination = "/archive/"
kind = 301

[[advanced.redirects]]
source = "/posts/{*}/index.html"
destination = "/posts/$1/"
kind = 301

[[advanced.redirects]]
source = "/pages/{*}/index.html"
destination = "/pages/$1/"
kind = 301

# Optional convenience redirect.
[[advanced.redirects]]
source = "/feed"
destination = "/feed.xml"
kind = 301

# -----------------------------------------------------------------------------
# Build-generated alias redirects belong below this line.
# Example:
# [[advanced.redirects]]
# source = "/2024/old-path/"
# destination = "/posts/new-path/"
# kind = 301
# -----------------------------------------------------------------------------

# Optional host canonicalization example.
# [[advanced.redirects]]
# host = "www.example.com"
# source = "/{**}"
# destination = "https://example.com/$1"
# kind = 301
