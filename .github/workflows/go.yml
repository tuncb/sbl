name: Go

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Run tests
        run: go test ./...

      - name: Build default CLI binary
        run: go build -trimpath ./cmd/sbl

  build-targets:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: windows-x86_64
            goos: windows
            goarch: amd64
            output: sbl.exe
          - name: linux-x86_64
            goos: linux
            goarch: amd64
            output: sbl
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            output: sbl

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile release target
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-X main.version=ci" -o "dist/${{ matrix.output }}" ./cmd/sbl
